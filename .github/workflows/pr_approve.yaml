name: "PR Approval"

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  pull_request:

permissions:
  pull-requests: write

jobs:
  label-pr:
    runs-on: ubuntu-latest
    steps:
      - name: "Fetch PR metadata from triggering run"
        id: pr-meta
        run: |
          PR_NUMBER=$(gh api \
            /repos/${{ github.repository }}/pulls \
            --jq '.[] | select(.head.ref == "${{ github.event.workflow_run.head_branch }}") | .number' \
            | head -n1)
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPER: ${{ secrets.SUPER }}

      - name: "Add label to PR"
        run: |
          PR_TITLE=$(gh pr view ${{ steps.pr-meta.outputs.pr_number }} \
            --json title --jq .title)
          echo Processing PR: $PR_TITLE
          gh pr edit ${{ steps.pr-meta.outputs.pr_number }} \
            --add-label "workflow-run-processed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Auto-approve if CI passed"
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        run: |
          gh pr review ${{ steps.pr-meta.outputs.pr_number }} \
            --approve \
            --body "CI passed — auto-approved."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
